<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HashSocial — Share &amp; Earn | HashUtopia</title>
  <style>
    /* ── Reset / base ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #0d0f1a;
      --card:      #161926;
      --border:    #262c42;
      --accent:    #7b5cfa;
      --accent2:   #3ecfcf;
      --text:      #e4e8f7;
      --muted:     #7a84a8;
      --green:     #2dd4a0;
      --red:       #f2566b;
      --radius:    12px;
      --shadow:    0 4px 24px rgba(0,0,0,.45);
    }
    html, body { height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif; font-size: 15px;
      line-height: 1.55; min-height: 100vh;
    }
    a { color: var(--accent2); text-decoration: none; }
    a:hover { text-decoration: underline; }
    button {
      cursor: pointer; border: none; border-radius: 8px;
      font-size: .9rem; font-weight: 600; transition: opacity .15s, transform .1s;
    }
    button:active { transform: scale(.97); }
    button:disabled { opacity: .45; cursor: not-allowed; }
    input, textarea {
      background: #0d0f1a; border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: .9rem;
      padding: .55rem .8rem; width: 100%; outline: none;
      transition: border-color .2s;
    }
    input:focus, textarea:focus { border-color: var(--accent); }

    /* ── Layout ─────────────────────────────────────────────── */
    .page { max-width: 900px; margin: 0 auto; padding: 2rem 1rem 4rem; }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 2.5rem; padding-bottom: 1.2rem;
      border-bottom: 1px solid var(--border);
    }
    header .logo { font-size: 1.7rem; }
    header h1 { font-size: 1.5rem; font-weight: 700; }
    header p   { color: var(--muted); font-size: .9rem; }

    /* ── Section heading ─────────────────────────────────────── */
    .section-title {
      font-size: 1.1rem; font-weight: 700; margin-bottom: 1.1rem;
      display: flex; align-items: center; gap: .5rem;
    }
    .section-title .badge {
      background: var(--accent); color: #fff; font-size: .72rem;
      padding: .15rem .55rem; border-radius: 99px;
    }

    /* ── Share & Earn panel ──────────────────────────────────── */
    #share-earn { margin-bottom: 3rem; }

    .reward-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem; margin-bottom: 1.5rem;
    }

    .reward-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1rem 1.1rem;
      display: flex; flex-direction: column; gap: .55rem;
      box-shadow: var(--shadow);
      transition: border-color .2s;
    }
    .reward-card.earned { border-color: var(--green); }
    .reward-card.selected { border-color: var(--accent); }

    .reward-card-top {
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    .reward-platform {
      display: flex; align-items: center; gap: .45rem; font-weight: 600;
    }
    .reward-icon { font-size: 1.3rem; }
    .reward-label { font-size: .95rem; }

    .reward-status {
      font-size: .75rem; font-weight: 700; padding: .2rem .6rem;
      border-radius: 99px; white-space: nowrap;
    }
    .status-available { background: rgba(123,92,250,.18); color: var(--accent); }
    .status-earned    { background: rgba(45,212,160,.18);  color: var(--green); }

    .reward-points {
      font-size: .82rem; color: var(--muted);
      display: flex; gap: 1rem;
    }
    .reward-points span { display: flex; align-items: center; gap: .25rem; }
    .reward-points strong { color: var(--text); }

    .reward-select-btn {
      background: var(--accent); color: #fff;
      padding: .4rem .75rem; font-size: .82rem; border-radius: 7px;
      align-self: flex-start; margin-top: .2rem;
    }
    .reward-select-btn.earned-btn {
      background: transparent; border: 1px solid var(--green);
      color: var(--green); cursor: default;
    }

    /* ── Proof submission form ────────────────────────────────── */
    #proof-form {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.4rem 1.5rem;
      box-shadow: var(--shadow);
    }
    #proof-form h3 { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; }
    .form-group { margin-bottom: .9rem; }
    .form-group label { display: block; font-size: .82rem; color: var(--muted); margin-bottom: .35rem; }
    .form-row { display: flex; gap: .7rem; }
    .form-row input { flex: 1; }
    .submit-btn {
      background: linear-gradient(135deg, var(--accent), #5a3fc5);
      color: #fff; padding: .55rem 1.5rem; font-size: .92rem;
      border-radius: 8px; white-space: nowrap;
    }
    .submit-btn:hover:not(:disabled) { opacity: .88; }

    #form-feedback {
      margin-top: .8rem; font-size: .87rem; border-radius: 7px;
      padding: .55rem .9rem; display: none;
    }
    #form-feedback.success { background: rgba(45,212,160,.12); color: var(--green); display: block; }
    #form-feedback.error   { background: rgba(242,86,107,.12);  color: var(--red);   display: block; }

    /* ── Social Feed (posts) ─────────────────────────────────── */
    #social-feed { margin-bottom: 3rem; }

    .post-composer {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.1rem 1.2rem;
      margin-bottom: 1rem; box-shadow: var(--shadow);
    }
    .post-composer textarea { resize: vertical; min-height: 72px; }
    .composer-actions {
      display: flex; justify-content: flex-end; margin-top: .6rem;
    }
    .post-btn {
      background: var(--accent); color: #fff;
      padding: .45rem 1.2rem; font-size: .88rem;
    }

    .post-list { display: flex; flex-direction: column; gap: .85rem; }

    .post-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1rem 1.2rem;
      box-shadow: var(--shadow);
    }
    .post-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: .5rem;
    }
    .post-author { font-weight: 600; font-size: .9rem; }
    .post-time   { color: var(--muted); font-size: .78rem; }
    .post-body   { font-size: .93rem; line-height: 1.6; margin-bottom: .7rem; }

    .post-actions {
      display: flex; gap: 1.2rem; align-items: center;
    }
    .action-btn {
      background: none; border: none; color: var(--muted);
      font-size: .82rem; display: flex; align-items: center; gap: .3rem;
      padding: .3rem .5rem; border-radius: 6px;
      transition: color .15s, background .15s;
    }
    .action-btn:hover { color: var(--text); background: rgba(255,255,255,.05); }
    .action-btn.liked { color: var(--accent); }

    .comment-list { margin-top: .8rem; padding-top: .7rem; border-top: 1px solid var(--border); }
    .comment {
      display: flex; gap: .6rem; margin-bottom: .55rem; font-size: .87rem;
    }
    .comment-author { font-weight: 600; color: var(--accent2); white-space: nowrap; }
    .comment-body   { color: var(--text); }

    .comment-form {
      display: flex; gap: .5rem; margin-top: .6rem;
    }
    .comment-input { flex: 1; font-size: .85rem; padding: .4rem .7rem; }
    .comment-submit {
      background: var(--card); border: 1px solid var(--border);
      color: var(--accent); padding: .4rem .9rem; font-size: .82rem;
    }
    .comment-submit:hover { border-color: var(--accent); }

    /* ── Empty state ─────────────────────────────────────────── */
    .empty { text-align: center; color: var(--muted); padding: 2.5rem 0; font-size: .95rem; }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 520px) {
      .form-row { flex-direction: column; }
      .reward-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="page">

  <header>
    <div class="logo">🌐</div>
    <div>
      <h1>HashSocial</h1>
      <p>Social hub for the HashUtopia ecosystem — share, earn, connect.</p>
    </div>
  </header>

  <!-- ══════════════════════════════════════════════════════
       SHARE & EARN PANEL
  ════════════════════════════════════════════════════════ -->
  <section id="share-earn">
    <div class="section-title">
      🎁 Share &amp; Earn
      <span class="badge">10 platforms</span>
    </div>

    <!-- Platform reward cards — populated by JS -->
    <div class="reward-grid" id="reward-grid">
      <div class="empty">Loading rewards…</div>
    </div>

    <!-- Proof URL submission form -->
    <div id="proof-form">
      <h3>📤 Submit Your Proof</h3>

      <div class="form-group">
        <label for="selected-platform">Selected platform</label>
        <input id="selected-platform" type="text" placeholder="Click a platform card above" readonly />
      </div>

      <div class="form-group">
        <label for="proof-url">Proof URL <span style="color:var(--muted)">(link to your post / screenshot)</span></label>
        <div class="form-row">
          <input
            id="proof-url"
            type="url"
            placeholder="https://twitter.com/yourhandle/status/…"
          />
          <button class="submit-btn" id="submit-share" disabled>Claim Reward</button>
        </div>
      </div>

      <div id="form-feedback"></div>
    </div>
  </section>

  <!-- ══════════════════════════════════════════════════════
       SOCIAL FEED
  ════════════════════════════════════════════════════════ -->
  <section id="social-feed">
    <div class="section-title">💬 Community Feed</div>

    <div class="post-composer">
      <textarea id="new-post-text" placeholder="Share something with the HashUtopia community…"></textarea>
      <div class="composer-actions">
        <button class="post-btn" id="create-post-btn">Post</button>
      </div>
    </div>

    <div class="post-list" id="post-list">
      <div class="empty">No posts yet — be the first!</div>
    </div>
  </section>

</div><!-- /.page -->

<script>
/* ──────────────────────────────────────────────────────────
   CONFIG
────────────────────────────────────────────────────────── */
const API_BASE   = '';          // same origin
const AUTH_TOKEN = localStorage.getItem('hu_token') || '1'; // demo: user id=1
const HEADERS    = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${AUTH_TOKEN}` };

/* ──────────────────────────────────────────────────────────
   STATE
────────────────────────────────────────────────────────── */
let rewards      = [];            // fetched from /api/social_share/rewards
let earnedSet    = new Set();     // reward IDs already claimed this session
let selectedPlatform = null;      // platform key currently selected

// In-memory feed (in production this would be server-side)
let posts = [
  {
    id: 1, author: 'System',
    body: '🎉 Welcome to HashSocial! Share HashUtopia and earn HSHU tokens.',
    time: Date.now() - 3600000, likes: 3, liked: false,
    comments: [{ author: 'Alice', body: 'Excited to be here! 🚀' }],
  },
];
let nextPostId = 2;

/* ──────────────────────────────────────────────────────────
   SHARE & EARN — load rewards
────────────────────────────────────────────────────────── */
async function loadRewards() {
  try {
    const res  = await fetch(`${API_BASE}/api/social_share/rewards`);
    const json = await res.json();
    if (json.success) {
      rewards = json.data;
      renderRewardGrid();
    }
  } catch {
    // Server might not be running; fall back to hard-coded list for UI demo
    rewards = [
      { id:'social_twitter',   platform:'twitter',   label:'Twitter',   icon:'🐦', points:10, hshu:5  },
      { id:'social_discord',   platform:'discord',   label:'Discord',   icon:'💬', points:10, hshu:5  },
      { id:'social_telegram',  platform:'telegram',  label:'Telegram',  icon:'✈️', points:10, hshu:5  },
      { id:'social_facebook',  platform:'facebook',  label:'Facebook',  icon:'📘', points:8,  hshu:4  },
      { id:'social_reddit',    platform:'reddit',    label:'Reddit',    icon:'🤖', points:12, hshu:6  },
      { id:'social_instagram', platform:'instagram', label:'Instagram', icon:'📸', points:8,  hshu:4  },
      { id:'social_youtube',   platform:'youtube',   label:'YouTube',   icon:'▶️', points:20, hshu:10 },
      { id:'social_twitch',    platform:'twitch',    label:'Twitch',    icon:'🎮', points:20, hshu:10 },
      { id:'social_whatsapp',  platform:'whatsapp',  label:'WhatsApp',  icon:'📱', points:6,  hshu:3  },
      { id:'social_kik',       platform:'kik',       label:'Kik',       icon:'💌', points:6,  hshu:3  },
    ];
    renderRewardGrid();
  }
}

function renderRewardGrid() {
  const grid = document.getElementById('reward-grid');
  grid.innerHTML = '';

  rewards.forEach(r => {
    const earned  = earnedSet.has(r.id);
    const card    = document.createElement('div');
    card.className = `reward-card${earned ? ' earned' : ''}${selectedPlatform === r.platform ? ' selected' : ''}`;
    card.dataset.platform = r.platform;
    card.dataset.rewardId = r.id;

    card.innerHTML = `
      <div class="reward-card-top">
        <div class="reward-platform">
          <span class="reward-icon">${r.icon}</span>
          <span class="reward-label">${r.label}</span>
        </div>
        <span class="reward-status ${earned ? 'status-earned' : 'status-available'}">
          ${earned ? 'Earned ✅' : 'Available'}
        </span>
      </div>
      <div class="reward-points">
        <span>🏆 <strong>${r.points} pts</strong></span>
        <span>💎 <strong>${r.hshu} HSHU</strong></span>
      </div>
      ${earned
        ? `<button class="reward-select-btn earned-btn" disabled>Already claimed</button>`
        : `<button class="reward-select-btn" data-platform="${r.platform}">Select →</button>`
      }
    `;

    if (!earned) {
      card.querySelector('button').addEventListener('click', () => selectPlatform(r.platform));
    }

    grid.appendChild(card);
  });
}

function selectPlatform(platform) {
  selectedPlatform = platform;
  document.getElementById('selected-platform').value = platform;
  document.getElementById('submit-share').disabled   = false;
  // Re-render to highlight selected card
  renderRewardGrid();
  document.getElementById('proof-url').focus();
}

/* ──────────────────────────────────────────────────────────
   SHARE & EARN — submit proof
────────────────────────────────────────────────────────── */
document.getElementById('submit-share').addEventListener('click', async () => {
  const proofUrl  = document.getElementById('proof-url').value.trim();
  const feedback  = document.getElementById('form-feedback');
  const btn       = document.getElementById('submit-share');

  feedback.className = '';
  feedback.style.display = 'none';

  if (!selectedPlatform) {
    showFeedback('error', 'Please select a platform first.');
    return;
  }
  if (!proofUrl) {
    showFeedback('error', 'Please enter a proof URL.');
    return;
  }

  btn.disabled    = true;
  btn.textContent = 'Submitting…';

  try {
    const res  = await fetch(`${API_BASE}/api/social_share`, {
      method: 'POST',
      headers: HEADERS,
      body: JSON.stringify({ platform: selectedPlatform, proof_url: proofUrl }),
    });
    const json = await res.json();

    if (json.success) {
      earnedSet.add(json.data.reward_id);
      showFeedback('success',
        `✅ Reward claimed! +${json.data.points_credited} pts &amp; +${json.data.hshu_credited} HSHU credited.`
      );
      document.getElementById('proof-url').value = '';
      selectedPlatform = null;
      document.getElementById('selected-platform').value = '';
      renderRewardGrid();
    } else {
      showFeedback('error', `❌ ${json.error}`);
    }
  } catch {
    showFeedback('error', '⚠️ Could not reach the server. Please try again.');
  } finally {
    btn.disabled    = false;
    btn.textContent = 'Claim Reward';
  }
});

function showFeedback(type, message) {
  const el = document.getElementById('form-feedback');
  el.className   = type;
  el.innerHTML   = message;
}

/* ──────────────────────────────────────────────────────────
   SOCIAL FEED
────────────────────────────────────────────────────────── */
function renderFeed() {
  const list = document.getElementById('post-list');
  if (posts.length === 0) {
    list.innerHTML = '<div class="empty">No posts yet — be the first!</div>';
    return;
  }

  list.innerHTML = '';
  [...posts].reverse().forEach(post => {
    const card = document.createElement('div');
    card.className = 'post-card';
    card.id = `post-${post.id}`;

    const commentsHtml = post.comments.map(c => `
      <div class="comment">
        <span class="comment-author">${escHtml(c.author)}:</span>
        <span class="comment-body">${escHtml(c.body)}</span>
      </div>
    `).join('');

    card.innerHTML = `
      <div class="post-header">
        <span class="post-author">👤 ${escHtml(post.author)}</span>
        <span class="post-time">${timeAgo(post.time)}</span>
      </div>
      <div class="post-body">${escHtml(post.body)}</div>
      <div class="post-actions">
        <button class="action-btn like-btn${post.liked ? ' liked' : ''}" data-id="${post.id}">
          ${post.liked ? '❤️' : '🤍'} ${post.likes} Like${post.likes !== 1 ? 's' : ''}
        </button>
        <button class="action-btn toggle-comments-btn" data-id="${post.id}">
          💬 ${post.comments.length} Comment${post.comments.length !== 1 ? 's' : ''}
        </button>
      </div>
      <div class="comment-list" id="comments-${post.id}" style="display:none">
        ${commentsHtml}
        <div class="comment-form">
          <input class="comment-input" placeholder="Add a comment…" data-id="${post.id}" />
          <button class="comment-submit" data-id="${post.id}">Send</button>
        </div>
      </div>
    `;

    list.appendChild(card);
  });

  // Like buttons
  list.querySelectorAll('.like-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id   = Number(btn.dataset.id);
      const post = posts.find(p => p.id === id);
      if (!post) return;
      post.liked  = !post.liked;
      post.likes += post.liked ? 1 : -1;
      renderFeed();
    });
  });

  // Toggle comments
  list.querySelectorAll('.toggle-comments-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const section = document.getElementById(`comments-${btn.dataset.id}`);
      section.style.display = section.style.display === 'none' ? 'block' : 'none';
    });
  });

  // Submit comment
  list.querySelectorAll('.comment-submit').forEach(btn => {
    btn.addEventListener('click', () => {
      const id    = Number(btn.dataset.id);
      const input = list.querySelector(`.comment-input[data-id="${id}"]`);
      const text  = input.value.trim();
      if (!text) return;
      const post = posts.find(p => p.id === id);
      if (!post) return;
      post.comments.push({ author: 'You', body: text });
      input.value = '';
      renderFeed();
      // Re-open comment section after re-render
      const section = document.getElementById(`comments-${id}`);
      if (section) section.style.display = 'block';
    });
  });
}

document.getElementById('create-post-btn').addEventListener('click', () => {
  const textarea = document.getElementById('new-post-text');
  const text     = textarea.value.trim();
  if (!text) return;
  posts.push({
    id: nextPostId++, author: 'You', body: text,
    time: Date.now(), likes: 0, liked: false, comments: [],
  });
  textarea.value = '';
  renderFeed();
});

/* ──────────────────────────────────────────────────────────
   UTILITIES
────────────────────────────────────────────────────────── */
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function timeAgo(ts) {
  const secs = Math.floor((Date.now() - ts) / 1000);
  if (secs < 60)   return 'just now';
  if (secs < 3600) return `${Math.floor(secs / 60)}m ago`;
  if (secs < 86400)return `${Math.floor(secs / 3600)}h ago`;
  return `${Math.floor(secs / 86400)}d ago`;
}

/* ──────────────────────────────────────────────────────────
   INIT
────────────────────────────────────────────────────────── */
loadRewards();
renderFeed();
</script>
</body>
</html>
