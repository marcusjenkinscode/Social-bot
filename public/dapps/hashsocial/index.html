<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HashUtopia Promotion Admin</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    .page {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 16px 50px;
    }
    .title {
      margin-bottom: 16px;
    }
    h1 {
      margin: 0;
      font-size: 1.6rem;
    }
    .subtitle {
      margin: 6px 0 0;
      color: #94a3b8;
    }
    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      color: #cbd5e1;
      font-size: 0.9rem;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0b1220;
      color: #f8fafc;
      font-size: 0.92rem;
    }
    textarea { min-height: 90px; resize: vertical; }
    .channels {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 10px;
      margin-top: 8px;
    }
    .channel {
      background: #0b1220;
      border: 1px solid #243244;
      border-radius: 10px;
      padding: 10px;
    }
    .channel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .switch {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 12px 0;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    button {
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .primary { background: #7c3aed; color: #fff; }
    .secondary { background: #1e293b; color: #e2e8f0; border: 1px solid #334155; }
    .success { background: #166534; color: #dcfce7; }
    .feedback {
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }
    .feedback.ok { display: block; background: #052e1f; color: #86efac; }
    .feedback.err { display: block; background: #450a0a; color: #fecaca; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }
    th, td {
      text-align: left;
      padding: 9px 8px;
      border-bottom: 1px solid #1e293b;
      vertical-align: top;
    }
    th { color: #94a3b8; }
    .muted { color: #94a3b8; }
    @media (max-width: 760px) {
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="title">
      <h1>🌐 HashUtopia Promotion Admin</h1>
      <p class="subtitle">Configure multi-platform promotion, trigger campaigns, and enable automatic promotion from one dashboard.</p>
    </div>

    <div class="card">
      <div class="row">
        <div>
          <label for="adminToken">Admin token (optional if ADMIN_TOKEN is unset)</label>
          <input id="adminToken" type="password" placeholder="Enter ADMIN_TOKEN" />
        </div>
        <div>
          <label for="intervalMinutes">Auto-promotion interval (minutes)</label>
          <input id="intervalMinutes" type="number" min="1" />
        </div>
      </div>
      <div class="switch">
        <input id="autoPromote" type="checkbox" />
        <label for="autoPromote" style="margin:0;">Enable automatic promotion scheduler</label>
      </div>
      <div class="row">
        <div>
          <label for="siteUrl">Site URL to promote</label>
          <input id="siteUrl" type="url" placeholder="https://example.com" />
        </div>
        <div>
          <label for="campaignTitle">Campaign title</label>
          <input id="campaignTitle" type="text" placeholder="Launch update" />
        </div>
      </div>
      <div style="margin-top:12px;">
        <label for="campaignMessage">Campaign message</label>
        <textarea id="campaignMessage" placeholder="Write your promotion message..."></textarea>
      </div>

      <h3 style="margin:16px 0 8px;">Channels</h3>
      <p class="muted" style="margin:0 0 8px;">Enable a channel and set its webhook URL to allow automated posting.</p>
      <div id="channels" class="channels"></div>

      <div class="actions">
        <button id="saveBtn" class="primary">Save Settings</button>
        <button id="promoteBtn" class="success">Promote Now</button>
        <button id="refreshBtn" class="secondary">Refresh Logs</button>
      </div>
      <div id="feedback" class="feedback"></div>
    </div>

    <div class="card">
      <h3 style="margin:0 0 10px;">Recent Promotion Runs</h3>
      <div style="overflow:auto;">
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>Source</th>
              <th>Campaign</th>
              <th>Result</th>
              <th>Channels</th>
            </tr>
          </thead>
          <tbody id="logRows">
            <tr><td colspan="5" class="muted">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const state = {
      supported: [],
      channels: [],
      webhooks: {},
    };

    const refs = {
      adminToken: document.getElementById('adminToken'),
      autoPromote: document.getElementById('autoPromote'),
      intervalMinutes: document.getElementById('intervalMinutes'),
      siteUrl: document.getElementById('siteUrl'),
      campaignTitle: document.getElementById('campaignTitle'),
      campaignMessage: document.getElementById('campaignMessage'),
      channels: document.getElementById('channels'),
      feedback: document.getElementById('feedback'),
      logRows: document.getElementById('logRows'),
      saveBtn: document.getElementById('saveBtn'),
      promoteBtn: document.getElementById('promoteBtn'),
      refreshBtn: document.getElementById('refreshBtn'),
    };

    refs.adminToken.value = localStorage.getItem('admin_token') || '';

    function authHeaders() {
      const token = refs.adminToken.value.trim();
      if (token) localStorage.setItem('admin_token', token);
      const headers = { 'Content-Type': 'application/json' };
      if (token) {
        headers['X-Admin-Token'] = token;
        headers['Authorization'] = `Bearer ${token}`;
      }
      return headers;
    }

    function showFeedback(kind, message) {
      refs.feedback.className = `feedback ${kind}`;
      refs.feedback.textContent = message;
    }

    function channelRow(channel) {
      const enabled = state.channels.includes(channel);
      const webhook = state.webhooks[channel] || '';
      return `
        <div class="channel">
          <div class="channel-head">
            <strong>${channel}</strong>
            <label style="display:flex;gap:6px;align-items:center;margin:0;">
              <input type="checkbox" data-channel-enable="${channel}" ${enabled ? 'checked' : ''} />
              Enable
            </label>
          </div>
          <label for="wh-${channel}">Webhook URL</label>
          <input id="wh-${channel}" data-channel-webhook="${channel}" type="url" value="${escapeHtml(webhook)}" placeholder="https://your-automation-endpoint" />
        </div>
      `;
    }

    function renderChannels() {
      refs.channels.innerHTML = state.supported.map(channelRow).join('');
    }

    function collectSettings() {
      const enabled = [];
      const webhooks = {};

      refs.channels.querySelectorAll('[data-channel-enable]').forEach(input => {
        if (input.checked) enabled.push(input.dataset.channelEnable);
      });

      refs.channels.querySelectorAll('[data-channel-webhook]').forEach(input => {
        webhooks[input.dataset.channelWebhook] = input.value.trim();
      });

      return {
        site_url: refs.siteUrl.value.trim(),
        campaign_title: refs.campaignTitle.value.trim(),
        campaign_message: refs.campaignMessage.value.trim(),
        channels: enabled,
        webhooks,
        auto_promote: refs.autoPromote.checked,
        interval_minutes: Number(refs.intervalMinutes.value || 1),
      };
    }

    async function loadConfig() {
      try {
        const res = await fetch('/api/admin/automation', { headers: authHeaders() });
        const json = await res.json();
        if (!json.success) throw new Error(json.error || 'Unable to load settings');

        state.supported = json.data.channels_supported || [];
        const s = json.data.settings || {};
        state.channels = Array.isArray(s.channels) ? s.channels : [];
        state.webhooks = s.webhooks || {};

        refs.autoPromote.checked = !!s.auto_promote;
        refs.intervalMinutes.value = s.interval_minutes || 60;
        refs.siteUrl.value = s.site_url || '';
        refs.campaignTitle.value = s.campaign_title || '';
        refs.campaignMessage.value = s.campaign_message || '';

        renderChannels();
      } catch (error) {
        showFeedback('err', error.message || 'Failed to load configuration');
      }
    }

    async function saveSettings() {
      try {
        const payload = collectSettings();
        const res = await fetch('/api/admin/automation/settings', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify(payload),
        });
        const json = await res.json();
        if (!json.success) throw new Error(json.error || 'Unable to save settings');
        showFeedback('ok', 'Automation settings saved.');
        await loadLogs();
      } catch (error) {
        showFeedback('err', error.message || 'Failed to save settings');
      }
    }

    async function promoteNow() {
      try {
        const payload = collectSettings();
        const res = await fetch('/api/admin/automation/promote', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify(payload),
        });
        const json = await res.json();
        if (!json.success) throw new Error(json.error || 'Promotion failed');
        showFeedback('ok', `Promotion run finished: ${json.data.success_count} success, ${json.data.failure_count} failed.`);
        await loadLogs();
      } catch (error) {
        showFeedback('err', error.message || 'Promotion failed');
      }
    }

    async function loadLogs() {
      try {
        const res = await fetch('/api/admin/automation/logs?limit=20', { headers: authHeaders() });
        const json = await res.json();
        if (!json.success) throw new Error(json.error || 'Unable to load logs');
        renderLogs(json.data || []);
      } catch (error) {
        refs.logRows.innerHTML = `<tr><td colspan="5" class="muted">${escapeHtml(error.message || 'Failed to load logs')}</td></tr>`;
      }
    }

    function renderLogs(logs) {
      if (!logs.length) {
        refs.logRows.innerHTML = '<tr><td colspan="5" class="muted">No promotion runs yet.</td></tr>';
        return;
      }

      refs.logRows.innerHTML = logs.map(log => {
        const results = Array.isArray(log.results) ? log.results : [];
        const failed = results.filter(r => !r.success).map(r => `${r.channel}: ${r.reason || 'failed'}`).join('; ');
        return `
          <tr>
            <td>${new Date(log.created_at).toLocaleString()}</td>
            <td>${escapeHtml(log.source || 'manual')}</td>
            <td>${escapeHtml(log.campaign_title || '')}</td>
            <td>
              ✅ ${Number(log.success_count || 0)} / ❌ ${Number(log.failure_count || 0)}
              ${failed ? `<div class="muted" style="margin-top:4px;">${escapeHtml(failed)}</div>` : ''}
            </td>
            <td>${escapeHtml((Array.isArray(log.channels) ? log.channels : []).join(', ') || '-')}</td>
          </tr>
        `;
      }).join('');
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    refs.saveBtn.addEventListener('click', saveSettings);
    refs.promoteBtn.addEventListener('click', promoteNow);
    refs.refreshBtn.addEventListener('click', loadLogs);

    Promise.all([loadConfig(), loadLogs()]);
  </script>
</body>
</html>
